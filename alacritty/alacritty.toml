[env]
TERM = "xterm-256color"

[font]
size = 10

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.offset]
x = 0
y = 1

[font.glyph_offset]
x = 0
y = 1

[window]
opacity = 0.9
decorations = "buttonless"
